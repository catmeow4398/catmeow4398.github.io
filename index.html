<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Info de jugador - Classicube</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 500px; margin: auto; }
    input, button { padding: 10px 14px; border-radius: 8px; border: none; font-size: 15px; }
    input { background: #1e293b; color: #fff; width: 60%; }
    button { background: #3b82f6; color: white; cursor: pointer; }
    #info { margin-top: 20px; padding: 15px; background: #1e293b; border-radius: 10px; display: none; }
    .error { color: #f87171; }
    .loading { color: #60a5fa; }
    .link-btn { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #22c55e; color: white; text-decoration: none; border-radius: 6px; }
  </style>
</head>

<body>
  <h2>Buscar jugador de Classicube</h2>
  <input id="user" placeholder="Ej: xLegit">
  <button onclick="buscar()">Buscar</button>

  <div id="info">
    <p id="loading" class="loading"></p>
    <p id="nombre"></p>
    <p id="id"></p>
    <p id="premium"></p>
    <p id="fecha"></p>
    <div id="error" class="error"></div>
  </div>

  <script>
    async function buscar() {
      const nombre = document.getElementById("user").value.trim();
      const infoDiv = document.getElementById("info");
      const loading = document.getElementById("loading");
      const errorDiv = document.getElementById("error");
      
      if (!nombre) return;
      
      infoDiv.style.display = "block";
      loading.textContent = "Buscando a " + nombre + "...";
      errorDiv.innerHTML = "";
      ["nombre","id","premium","fecha"].forEach(id => document.getElementById(id).textContent = "");

      const apiUrl = `https://www.classicube.net/api/player/${encodeURIComponent(nombre)}.json`;

      try {
        // Intentamos con el proxy más estable
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`);
        if(!res.ok) throw new Error("Proxy caído");
        
        const wrapper = await res.json();
        const data = JSON.parse(wrapper.contents);
        loading.textContent = "";
        
        if (!data.Name) throw new Error("Jugador no encontrado");
        
        document.getElementById("nombre").textContent = "Nombre: " + data.Name;
        document.getElementById("id").textContent = "ID: " + data.ID;
        document.getElementById("premium").textContent = "Premium: " + (data.Premium ? "Sí" : "No");
        document.getElementById("fecha").textContent = "Registrado: " + new Date(data.FirstLogin * 1000).toLocaleString("es-PE");
        
      } catch (err) {
        loading.textContent = "";
        // Si falla todo, damos link directo
        errorDiv.innerHTML = `
          No se pudo cargar automático por bloqueo del navegador.<br><br>
          Pero puedes ver el perfil directo aquí: 
          <a class="link-btn" href="https://www.classicube.net/player/${encodeURIComponent(nombre)}" target="_blank">Ver perfil de ${nombre}</a>
        `;
      }
    }

    document.getElementById("user").addEventListener("keypress", e => {
      if (e.key === "Enter") buscar();
    });
  </script>
</body>
</html>
