<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Classicube Player Card</title>
<style>
  body { background: #0d0d0d; font-family: system-ui, sans-serif; display:flex; justify-content:center; padding:40px; }
  .card {
    background: #1a1a1a;
    color: #e0e0e0;
    width: 420px;
    padding: 20px;
    border-radius: 10px;
    border-left: 4px solid #00d1ff;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }
  .header { display:flex; gap:15px; align-items:center; border-bottom:1px solid #333; padding-bottom:12px; margin-bottom:12px; }
  .header img { width: 64px; height: 64px; background:#222; border-radius:8px; image-rendering: pixelated; }
  .header .name { font-size: 22px; font-weight: bold; }
  .header .id { font-size: 14px; color:#aaa; }
  .row { display:flex; justify-content:space-between; margin:10px 0; font-size:14px; }
  .label { color:#aaa; text-transform: uppercase; font-size:12px; letter-spacing:0.5px; }
  .full { margin:10px 0; }
  .skin-url { color:#00d1ff; text-decoration:none; word-break: break-all; }
  .skin-url:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card" id="player-card">
  Cargando...
</div>

<script>
async function cargarJugador(username) {
  const res = await fetch(`https://www.classicube.net/api/player/?name=${username}`);
  if(!res.ok) return document.getElementById('player-card').innerText = "Jugador no encontrado";
  const data = await res.json();
  
  // Convertir timestamp a fecha legible
  const fechaRegistro = new Date(data.Registered * 1000);
  const fechaStr = fechaRegistro.toLocaleString('es-ES', { 
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
    hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC' 
  }) + " UTC";
  
  // Calcular tiempo transcurrido
  const diff = Date.now() - fechaRegistro.getTime();
  const dias = Math.floor(diff / 86400000);
  const horas = Math.floor((diff % 86400000) / 3600000);
  const minutos = Math.floor((diff % 3600000) / 60000);
  const segundos = Math.floor((diff % 60000) / 1000);
  const transcurrido = `Hace ${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos.`;

  const premium = data.Premium ? "Sí" : "No";
  const skinUrl = `https://cdn.classicube.net/skin/${data.Name}.png`;

  document.getElementById('player-card').innerHTML = `
    <div class="header">
      <img src="${skinUrl}" alt="skin">
      <div>
        <div class="name">Usuario: ${data.Name}</div>
        <div class="id">ID: ${data.Id}</div>
      </div>
    </div>

    <div class="row">
      <div><div class="label">Estado Premium</div><div>${premium}</div></div>
      <div><div class="label">Registrado (Timestamp)</div><div>Registered[${data.Registered}]</div></div>
    </div>

    <div class="full">
      <div class="label">Fecha de registro exacta</div>
      <div>${fechaStr}</div>
    </div>

    <div class="full">
      <div class="label">Tiempo transcurrido</div>
      <div>${transcurrido}</div>
    </div>

    <div class="full">
      <div class="label">URL de la skin</div>
      <a class="skin-url" href="${skinUrl}" target="_blank">${skinUrl}</a>
    </div>
  `;
}

cargarJugador("Xiaomi"); // <-- cambia aquí el nombre
</script>

</body>
</html>
